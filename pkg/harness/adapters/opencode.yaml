name: opencode
cli: opencode
args:
  - "run"
  - "--format"
  - "json"
  - "--model"
  - "{{model}}"
prompt_via: stdin
continue_args:
  - "--session"
  - "{{session_id}}"
output_parser: opencode
# none: session migration unimplemented — sessions are workspace-bound, so a task
# revived into a moved workspace won't carry prior context (see docs/adding-an-adapter.md).
session_handler: none
