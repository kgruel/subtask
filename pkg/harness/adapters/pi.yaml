name: pi
cli: pi
args:
  - "-p"
  - "--mode"
  - "json"
  - "--provider"
  - "{{provider}}"
  - "--model"
  - "{{model}}"
  - "--thinking"
  - "{{reasoning}}"
prompt_via: arg
continue_args:
  - "--session"
  - "{{session_id}}"
output_parser: generic-jsonl
parse:
  session_id: ".id"
  reply: ".assistantMessageEvent.delta"
  reply_accumulate: true
  tool_call_match:
    type: "tool_execution_start"
# none: session migration unimplemented — sessions are workspace-bound, so a task
# revived into a moved workspace won't carry prior context (see docs/adding-an-adapter.md).
session_handler: none
