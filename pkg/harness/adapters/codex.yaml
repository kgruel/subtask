name: codex
cli: codex
args:
  - "exec"
  - "--json"
  - "--dangerously-bypass-approvals-and-sandbox"
  - "-m"
  - "{{model}}"
  - "-c"
  - "model_reasoning_effort={{reasoning}}"
prompt_via: arg
continue_args:
  - "resume"
  - "{{session_id}}"
output_parser: codex
capabilities:
  continue_session: true
  review: true
session_handler: codex
