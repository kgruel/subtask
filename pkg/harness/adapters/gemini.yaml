name: gemini
cli: gemini
args:
  - "--prompt"
  - "{{prompt}}"
  - "-o"
  - "stream-json"
  - "--approval-mode"
  - "yolo"
  - "-m"
  - "{{model}}"
prompt_via: arg
continue_args:
  - "--resume"
  - "{{session_id}}"
output_parser: gemini
capabilities:
  continue_session: true
  review: true
session_handler: none
env:
  OTEL_SDK_DISABLED: "true"
