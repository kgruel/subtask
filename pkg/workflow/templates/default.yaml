name: default
description: Simple task execution

instructions:
    worker: |
        When applicable, create PROGRESS.json to track your steps:
        ```json
        [
            {"step": "First step", "done": false},
            {"step": "Second step", "done": false}
        ]
        ```
        Update `done: true` as you complete each step, or revise as needed. Commit when done.

stages:
    - name: doing
      instructions: |
          Worker is implementing.

          Check progress: `subtask show <task>`
          When ready for lead review: `subtask stage <task> review` to get instructions

    - name: review
      instructions: |
          1. Skim the diff: `subtask diff --stat <task>` then `subtask diff <task>`.
          2. Run a cross-adapter AI review pass:
               `subtask review --task <task> --preset <reviewer> "<focus, if any>"`
             List reviewer options with `subtask presets`; pick a preset whose
             adapter differs from the worker's for blind-spot coverage.
          3. Address findings: `subtask send <task> "Please..."`. After
             substantive fixes, re-run the same
             `subtask review --task <task> --preset <reviewer> ...` command.
          4. When ready for human to decide: `subtask stage <task> ready`

    - name: ready
      instructions: |
          Task is ready. Notify human and ask them if they want to merge or create a PR.
