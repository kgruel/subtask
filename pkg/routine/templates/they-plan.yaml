name: they-plan
description: Worker drafts the plan, you review and approve
default_prompt:
  text: |
    When applicable, create PROGRESS.json in the task directory to track your steps:
    ```json
    [
        {"step": "First step", "done": false},
        {"step": "Second step", "done": false}
    ]
    ```
    Update `done: true` as you complete each step, or revise steps as needed. Commit your code changes when done. Do NOT commit anything under `.subtask/tasks/...` (PROGRESS.json, etc.) — those files live in the task folder, not the worktree.
steps:
  - id: plan
    worker_context: |
      **PLANNING phase.** Your job is to draft PLAN.md in this task's folder.
      Do NOT begin implementation until the lead approves and stages you to
      `implement`.

      The PLAN.md should cover:
      - Goal, scope, and explicit non-goals.
      - File-by-file change inventory.
      - Decisions made (and why).
      - Open questions you want the lead's input on.
      - If the change touches a shared type, contract, or interface:
        enumerate every consumer surface (CLI commands, TUI tabs, JSON output,
        etc.) and state how the contract applies to each. Missed-surface
        regressions are the most expensive class to catch late.

      Do NOT:
      - Edit, create, or delete files outside `.subtask/tasks/<this-task>/`.
      - Run build, test, or formatter commands during this step.
      - Begin coding work of any kind.

      When PLAN.md is ready, reply summarizing your plan and any open questions.
    instructions: |
      **You set goals, worker plans and executes.** Push for simplicity, clarity and elegance. Push back against shortcuts and over-engineering.

      1. Ask worker to draft PLAN.md in the task directory (relative path).
         Remind the worker that if the change touches a shared type or contract,
         PLAN.md must enumerate every consumer surface.
      2. Review PLAN.md and ask yourself: is this the ideal solution?
      3. Suggest improvements or ask to explore other solutions, if needed
      4. Repeat until you're both satisfied

      When approved:
        `subtask stage <task> implement`
        `subtask send <task> "Plan approved. Implement it. Update PROGRESS.json as you go, commit your code changes when done. Do NOT commit anything under .subtask/tasks/... (PROGRESS.json, etc.)."`

  - id: implement
    worker_context: |
      Commit your code changes when done. Do NOT commit anything under `.subtask/tasks/...` (PROGRESS.json, etc.) — those files live in the task folder, not the worktree.
    instructions: |
      Worker is implementing and updating PROGRESS.json.

      Check progress: `subtask show <task>`
      When implemented: `subtask stage <task> review` to get instructions

  - id: review
    instructions: |
      1. Skim the diff: `subtask diff --stat <task>` then `subtask diff <task>`.
      2. Run a cross-adapter AI review pass:
           `subtask review --task <task> --agent <reviewer> "<focus, if any>"`
         List reviewer options with `subtask agents`; pick an agent whose
         adapter differs from the worker's for blind-spot coverage.
      3. Address findings: `subtask send <task> "Please..."`. After
         substantive fixes, re-run the same
         `subtask review --task <task> --agent <reviewer> ...` command.
      4. When ready for human to decide: `subtask stage <task> ready`

  - id: ready
    kind: terminal
    instructions: |
      Task is ready. Notify human and ask them if they want to merge or create a PR.
