name: you-plan
description: You draft the plan, worker reviews and implements
default_prompt:
  text: |
    When applicable, create PROGRESS.json in the task directory to track your steps:
    ```json
    [
        {"step": "First step", "done": false},
        {"step": "Second step", "done": false}
    ]
    ```
    Update `done: true` as you complete each step, or revise steps as needed. Commit your code changes when done. Do NOT commit anything under `.subtask/tasks/...` (PROGRESS.json, etc.) — those files live in the task folder, not the worktree.
steps:
  - id: plan
    worker_context: |
      **REVIEW-ONLY phase.** PLAN.md has already been drafted by the lead.
      Your job in this step is to read and critique it — NOT to implement.

      Do:
      - Read PLAN.md in this task's folder. Read any plan-of-record the lead points to.
      - Push back on anything wrong, under-specified, or that you'd do differently.
        Specifically scrutinize sections labeled "Open for worker pushback".
      - Suggest simplifications. Flag over-engineering.
      - If the change touches a shared type, contract, or interface: enumerate
        every consumer surface (CLI commands, TUI tabs, JSON output, etc.) and
        confirm each one honors the proposed contract. Iterative discovery of
        missed surfaces is the most expensive class of regression.
      - Reply with your review. Do not edit PLAN.md unless the lead asks you to.

      Do NOT:
      - Edit, create, or delete files outside `.subtask/tasks/<this-task>/`.
      - Run build, test, or formatter commands.
      - Begin implementation work of any kind.

      Wait for the lead to send "approved" (or equivalent) and to stage you to
      `implement` before any code changes.
    instructions: |
      **You lead, worker executes.** Push for simplicity and elegance. Push back against over-engineering.

      1. Draft PLAN.md in the task directory. If the change touches a shared
         type, contract, or interface, enumerate every consumer surface in PLAN.md
         (e.g., for a CLI/TUI codebase: show, list, send, stage, draft, JSON, TUI
         Overview, TUI list) and state how the contract applies to each.
      2. Ask worker to review, poke holes, suggest simplifications or superior approaches
      3. Ask them to revise PLAN.md if you agree with their comments
      4. Repeat until you're both satisfied and worker confirms no issues left

      When approved:
        `subtask stage <task> implement`
        `subtask send <task> "Plan approved. Implement it. Update PROGRESS.json as you go, commit your code changes when done. Do NOT commit anything under .subtask/tasks/... (PROGRESS.json, etc.)."`

  - id: implement
    worker_context: |
      Commit your code changes when done. Do NOT commit anything under `.subtask/tasks/...` (PROGRESS.json, etc.) — those files live in the task folder, not the worktree.
    instructions: |
      Worker is implementing and updating PROGRESS.json.

      Check progress: `subtask show <task>`
      When implemented: `subtask stage <task> review` to get instructions

  - id: review
    instructions: |
      1. Skim the diff: `subtask diff --stat <task>` then `subtask diff <task>`.
      2. Run a cross-adapter AI review pass:
           `subtask review --task <task> --agent <reviewer> "<focus, if any>"`
         List reviewer options with `subtask agents`; pick an agent whose
         adapter differs from the worker's for blind-spot coverage.
      3. Address findings: `subtask send <task> "Please..."`. After
         substantive fixes, re-run the same
         `subtask review --task <task> --agent <reviewer> ...` command.
      4. When ready for human to decide: `subtask stage <task> ready`

  - id: ready
    kind: terminal
    instructions: |
      Task is ready. Notify human and ask them if they want to merge or create a PR.
